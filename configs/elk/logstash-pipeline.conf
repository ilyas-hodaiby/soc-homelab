# Logstash Pipeline — Wazuh to Elasticsearch
# File: /etc/logstash/conf.d/wazuh-pipeline.conf

input {
  # Receive Wazuh alerts on port 5000
  beats {
    port => 5000
    codec => json_lines
  }
}

filter {
  # Parse Wazuh alert JSON
  if [type] == "wazuh" {
    json {
      source => "message"
    }

    # Add GeoIP data to source IP if present
    if [data][srcip] {
      geoip {
        source => "[data][srcip]"
        target => "geoip"
      }
    }

    # Add a human-readable timestamp
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }

    # Add alert severity label based on rule level
    if [rule][level] >= 10 {
      mutate { add_field => { "severity_label" => "high" } }
    } else if [rule][level] >= 7 {
      mutate { add_field => { "severity_label" => "medium" } }
    } else {
      mutate { add_field => { "severity_label" => "low" } }
    }
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => ["http://192.168.56.10:9200"]
    index => "wazuh-alerts-%{+YYYY.MM.dd}"
    user => "elastic"
    password => "YOUR_ELASTIC_PASSWORD"
  }
}
